# Matriz de Paridad Conductual Crew Chief V4 → Vantare Ingeniero
# Generado: 2026-06-07
# Fuentes: CC GitLab (main), Vantare código fuente + tests
# Idioma: Español (nombres código/archivos en inglés)

paridad_matrix:
  - id: "LMU-01"
    nombre_cc: "Spotter Car Left/Right"
    nombre_vantare: "Spotter lateral proximity"
    dispara_cuando_cc: "Coche en lado izquierdo/derecho, alignedX < trackZoneToConsider (20m), velocidad > minSpeedForSpotterToOperate (10 m/s), gap Z < carLength o longCarLength para reanuncio, closingSpeed < maxClosingSpeed"
    dispara_cuando_vantare: "detect_cartesian_overlap OR detect_path_lateral_proximity OR detect_lateral_proximity, threshold 3m + vehicle_width_bonus, min_speed 10 m/s, no in_pits"
    no_dispara_cuando_cc: "in_pits, velocidad < minSpeedForSpotterToOperate, raceStart activo, qualifying si spotterOffQualifying=True, manualFormationLap, channelLeftOpenTimer expirado (5s)"
    no_dispara_cuando_vantare: "in_pits, velocidad < SPOTTER_MIN_SPEED_MS (10 m/s), qualifying si SPOTTER_OFF_QUALIFYING=True, race_start_delay activo, competitors=0, exclude_stopped"
    repeticion_cc: "hold-repeat cada 3s (spotter_hold_repeat_frequency), clear delay 150ms (spotter_clear_delay), overlap delay 2s (spotter_overlap_delay)"
    repeticion_vantare: "hold-repeat cada 3s (SPOTTER_HOLD_REPEAT_S), clear delay 0.15s, still_there cada hold_repeat_s, closing_fast edge-once"
    canal_cc: "spotter TTS inmediato (SoundType.IMPORTANT_MESSAGE), playback inmediato por AudioPlayer"
    canal_vantare: "alert proximity (IMMEDIATE audio_priority 2-3) → priorityAudioQueue IMMEDIATE"
    texto_cc: "WAV pre-grabado: car_left/car_right folders (spotter personalizado)"
    texto_vantare: "TTS dinámico: 'Coche por izquierda/derecha' con clase/nombre piloto vía build_proximity_message"
    propiedad_cc: "min_speed_for_spotter=10 (default), spotter_hold_repeat_frequency=3, spotter_clear_delay=150, spotter_overlap_delay=2000, time_after_race_start_for_spotter=20"
    fuente_cc: "NoisyCartesianCoordinateSpotter.cs:triggerInternal"
    fuente_vantare: "spotter.py:_eval_proximity, spotter_state.py:update"
    delta_conductual: "CC usa WAV grabados por spotter humano; Vantare usa TTS. CC detecta hasta 3 coches por lado para 3-wide; Vantare detecta cualquier lado con coche. CC usa longCarLength (carLength+gapForClear) para histéresis clear; Vantare usa exit_hysteresis 1.25x threshold."
    cambio_propuesto: "Mantener actual. Añadir hysteretic exit threshold con car_length + gap_for_clear style CC para evitar clear/reappear rápido en curvas."
    prioridad: P2
    test_sugerido: "test_spotter_hysteresis_exit: verify clear delay longer when car was at threshold boundary"
    paridad: MATCH

  - id: "LMU-02"
    nombre_cc: "Spotter Clear Left/Right"
    nombre_vantare: "Spotter clear message"
    dispara_cuando_cc: "carsOnLeft/Right pasa de >0 a 0, delay clearMessageDelay 150ms (oval: ovalClearMessageDelay custom)"
    dispara_cuando_vantare: "lado pasa de CAR_PRESENT a PENDING_CLEAR → CLEAR tras SPOTTER_CLEAR_DELAY_S (0.15s)"
    no_dispara_cuando_cc: "channelLeftOpenTimerStarted si velocidad < minSpeed; si hay coche en lado opuesto, clear_left/right individual"
    no_dispara_cuando_vantare: "si lado opuesto sigue ocupado → clear individual; clear_all solo si ambos lados CLEAR"
    repeticion_cc: "edge-once por transición, clearMessageExpiresAfter=2000ms"
    repeticion_vantare: "edge-once por transición, clear_all consolidación de ambos lados"
    canal_cc: "spotter TTS inmediato"
    canal_vantare: "alert proximity IMMEDIATE audio_priority 2"
    texto_cc: "WAV: clear_left / clear_right / clear_all_round"
    texto_vantare: "TTS: 'Despejado izquierda/derecha/alrededor' vía spotter_phrase personality"
    propiedad_cc: "spotter_clear_delay=150ms"
    fuente_cc: "NoisyCartesianCoordinateSpotter.cs:getNextMessage"
    fuente_vantare: "spotter_state.py:_update_side, _consolidate_clears"
    delta_conductual: "CC tiene clear_all_round separado (ambos lados libres simultáneamente); Vantare lo consolida bien. CC tiene message expiry (2000ms); Vantare no tiene mecanismo de expiración de mensajes en cola."
    cambio_propuesto: "Añadir message expiry style CC a los alerts del spotter (ttl=2 ya existe parcialmente en _create_alert)"
    prioridad: P2
    test_sugerido: "test_spotter_clear_expiry: verify message not played if delayed beyond expiry window"
    paridad: MATCH

  - id: "LMU-03"
    nombre_cc: "Spotter Three-Wide ('in the middle')"
    nombre_vantare: "Spotter three-wide (in_the_middle)"
    dispara_cuando_cc: "carsOnLeft>0 AND carsOnRight>0, delay onSingleOverlapTo3WideDelay 0.5s si bouncing de pending clear, sino inmediato. Si use3WideLeftAndRight, check separacion_max-min > carWidth para descartar line-astern"
    dispara_cuando_vantare: "left_present AND right_present simultáneamente en mismo tick, bouncing delay hold_repeat_s/2, sino inmediato"
    no_dispara_cuando_cc: "line-astern (separacion<carWidth) con 3-wide-left/right desactivado; si ya estaba three_wide, reanuncio hold repeat"
    no_dispara_cuando_vantare: "bounce delay si estado previo era PENDING_CLEAR en algún lado"
    repeticion_cc: "hold-repeat si se mantiene three-wide"
    repeticion_vantare: "reannounce cada hold_repeat_s si se mantiene"
    canal_cc: "spotter TTS inmediato (IMPORTANT_MESSAGE)"
    canal_vantare: "alert proximity IMMEDIATE audio_priority 3 (HIGH)"
    texto_cc: "WAV: in_the_middle / three_wide_on_left / three_wide_on_right/inside/outside"
    texto_vantare: "TTS: 'En el medio' vía personality spotter_phrase"
    propiedad_cc: "spotter_enable_three_wide_left_and_right=false (default), spotter_hold_repeat_frequency=3"
    fuente_cc: "NoisyCartesianCoordinateSpotter.cs:getNextMessage"
    fuente_vantare: "spotter_state.py:update → three_wide_transition"
    delta_conductual: "CC tiene 3-wide-on-left/right (3 coches lado) + 3-wide-on-inside/outside (oval). CC desactiva 3-wide-on-left/right por defecto. Vantare solo detecta 'ambos lados ocupados' (estilo CC default). CC detecta separación lateral entre coches para line-astern vs stacked."
    cambio_propuesto: "Implementar detección line-astern style CC en Vantare: si hay 2+ hits en mismo lado, verificar si separación lateral > carWidth para distinguir stacked vs line-astern. Requiere refactor hits_por_lado."
    prioridad: P1
    test_sugerido: "test_spotter_line_astern: 2 cars same side separated by <carWidth lateral → not three-wide"
    paridad: MATCH

  - id: "LMU-04"
    nombre_cc: "Pit Limiter Engage Warning"
    nombre_vantare: "Pit limiter engage alert"
    dispara_cuando_cc: "pit_limiter no activo al entrar en pits, grace period ~3s (sim dependiente), velocidad > umbral, sin cooldown reciente"
    dispara_cuando_vantare: "pit_enter_edge detectado, grace PIT_LIMITER_GRACE_S=3s, limiter no activo, speed > PIT_LIMITER_MIN_SPEED_MS=1.0, cooldown 30s, entry_window 8s"
    no_dispara_cuando_cc: "in_pits con limiter OK, cooldown activo, speed < umbral"
    no_dispara_cuando_vantare: "limiter confirmado on_this_stop, fuera de entry_window, speed < min_speed, cooldown activo"
    repeticion_cc: "edge-once por entrada"
    repeticion_vantare: "edge-once, cooldown 30s"
    canal_cc: "spotter TTS inmediato"
    canal_vantare: "alert limiter IMMEDIATE audio_priority 4 (CRITICAL)"
    texto_cc: "WAV: pit_limiter_engage"
    texto_vantare: "TTS: 'Pit limiter no activado al entrar en boxes.' (personality phrase)"
    propiedad_cc: "propiedades pit lane dependientes de sim"
    fuente_cc: "NoisyCartesianCoordinateSpotter.cs (limiter logic in Spotter.cs callbacks)"
    fuente_vantare: "spotter.py:_eval_pit_limiters"
    delta_conductual: "CC grace period varía por sim (PCars ~3s, rF2 ~0). Vantare PIT_LIMITER_GRACE_S=3s. Reintentos LMU 0.5s si speed==0. Paridad funcional."
    cambio_propuesto: "Ninguno. Mantener grace=3s para LMU. CC source para LMU no encontrado (CC: NO VERIFICADO LMU)."
    prioridad: P2
    test_sugerido: "test_pit_limiter_engage_lmu: test grace window with LMU telemetry fixture"
    paridad: MATCH

  - id: "LMU-05"
    nombre_cc: "Pit Limiter Disengage Warning"
    nombre_vantare: "Pit limiter disengage alert"
    dispara_cuando_cc: "salida de boxes con limiter activo, delay tras pit_exit"
    dispara_cuando_vantare: "pit_exit_edge detectado, limiter_on o confirmed, check tras PIT_LIMITER_EXIT_CHECK_S=2s, limiter sigue activo, cooldown 30s"
    no_dispara_cuando_cc: "limiter off OK al salir, cooldown"
    no_dispara_cuando_vantare: "limiter off tras exit_check, fuera de disengage_window (6s)"
    repeticion_cc: "edge-once"
    repeticion_vantare: "edge-once con reintentos 0.5s si LMU parpadea"
    canal_cc: "spotter TTS inmediato"
    canal_vantare: "alert limiter IMMEDIATE audio_priority 3 (WARNING)"
    texto_cc: "WAV: pit_limiter_disengage"
    texto_vantare: "TTS: 'Pit limiter no desactivado al salir de boxes.'"
    propiedad_cc: "-"
    fuente_cc: "NoisyCartesianCoordinateSpotter.cs (engineered limiter logic)"
    fuente_vantare: "spotter.py:_eval_pit_limiters"
    delta_conductual: "Vantare tiene lógica de reintentos contra flicker LMU que CC puede no tener. Paridad funcional superior."
    cambio_propuesto: "Ninguno. Vantare maneja flicker LMU mejor que CC."
    prioridad: P2
    test_sugerido: "test_pit_limiter_disengage_flicker: LMU flickers in_pits during exit → still warns"
    paridad: MATCH

  - id: "LMU-06"
    nombre_cc: "Fuel Critical Spotter (<1 lap)"
    nombre_vantare: "Fuel critical spotter"
    dispara_cuando_cc: "fuel < 1 lap, solo en race (indirectamente via sesión), enable_fuel_messages"
    dispara_cuando_vantare: "fuel_critical_from_tick threshold=1.0, finish-safe check, edge-once via fuel_safety.py"
    no_dispara_cuando_cc: "pits, enable_fuel_messages=false"
    no_dispara_cuando_vantare: "finish-safe (pit_stops_needed=0, fuel_in_tank >= needed_to_finish, estimated_laps >= laps_left), ya warned"
    repeticion_cc: "cooldown via Fuel.cs cada ~5s (fuelStatusCheckInterval), edge según nivel"
    repeticion_vantare: "edge-once _warned_fuel_critical flag"
    canal_cc: "ingeniero TTS, priority 10"
    canal_vantare: "alert fuel IMMEDIATE audio_priority 4 (CRITICAL)"
    texto_cc: "WAV: fuel/about_to_run_out (cuando fuel<3L y < avg_usage/3 en sector 3)"
    texto_vantare: "TTS: '¡Combustible crítico! Menos de 1 vuelta restante.'"
    propiedad_cc: "enable_fuel_messages=true (default), fuelStatusCheckInterval=5s"
    fuente_cc: "Fuel.cs:triggerInternal - folderAboutToRunOut (sector 3, fuel<3L)"
    fuente_vantare: "spotter.py:_eval_fuel_critical"
    delta_conductual: "CC avisa 'about_to_run_out' en sector 3 cuando fuel<3L y <1/3 de avg_lap; Vantare avisa <1 vuelta finish-safe. CC tiene más capas (1L, 2L, half gallon). Vantare finish-safe evita falsos positivos que CC no tiene."
    cambio_propuesto: "Añadir fuel_about_to_run_out message style CC: cuando fuel_laps_remaining < 0.5 y sector=3, mensaje '¡Sin combustible! Entra a boxes ahora.' Separado del edge-once <1 lap."
    prioridad: P1
    test_sugerido: "test_fuel_about_to_run_out_sector3: fuel_laps=0.4 sector=3 → alert fuel urgency"
    paridad: MATCH
    evidencia_vantare: "LMU validation 2026-06-08; spotter fuel critical edge-once"

  - id: "LMU-07"
    nombre_cc: "Safety Car / FCY Detection"
    nombre_vantare: "Safety car / FCY alert"
    dispara_cuando_cc: "FlagsMonitor: FCY phase transition (RACING→PITS_CLOSED, etc), sector yellows, local yellows"
    dispara_cuando_vantare: "spotter._eval_safety_car: safety_car_active OR full_course_yellow_active, edge-once"
    no_dispara_cuando_cc: "in_pits, session running time < 10s, onManualFormationLap"
    no_dispara_cuando_vantare: "ya warned, sc inactivo"
    repeticion_cc: "edge-once por fase FCY (PITS_CLOSED, PITS_OPEN, etc.), cooldown 25s entre yellows"
    repeticion_vantare: "edge-once por activación"
    canal_cc: "ingeniero TTS, FCY fase messages priority 10"
    canal_vantare: "alert safety_car IMMEDIATE audio_priority 4 (CRITICAL)"
    texto_cc: "WAV múltiples: fc_yellow_start, pits_closed, pits_open, prepare_for_green, etc."
    texto_vantare: "TTS: 'Safety car desplegado / FCY activo en pista.'"
    propiedad_cc: "time_between_caution_period_status_reminders=configurable"
    fuente_cc: "FlagsMonitor.cs:triggerInternal - gameDataYellowFlagImplementation"
    fuente_vantare: "spotter.py:_eval_safety_car"
    delta_conductual: "CC tiene ciclo completo FCY (pits close→open→green), mensajes separados. Vantare solo alerta 'SC/FCY activo' una vez. No hay mensajes de 'reinicio verde' en spotter. triggers.py FlagsMonitorTrigger tiene transiciones vía flags_monitor.py (bandera verde incluida), pero spotter no."
    cambio_propuesto: "Extender spotter._eval_safety_car para emitir 'green_flag' cuando SC/FCY termina. Usar flags_monitor.py para detectar transiciones SC→GREEN. Mantener edge-once."
    prioridad: P1
    test_sugerido: "test_spotter_sc_green_transition: SC active→inactive → emits green_flag alert"
    paridad: MATCH
    evidencia_vantare: "LMU validation 2026-06-08; FCY/SC alert + flags CC module @ 20Hz"

  - id: "LMU-08"
    nombre_cc: "Last Lap Announcement"
    nombre_vantare: "Last lap spotter"
    dispara_cuando_cc: "SessionEndMessages + LapCounter: session_laps_remaining=1 (race) o session_time_remaining < bestLapTime"
    dispara_cuando_vantare: "spotter._eval_last_lap: session_laps_left==1 OR is_last_lap, edge-once"
    no_dispara_cuando_cc: "pits, enable_session_end_messages=false"
    no_dispara_cuando_vantare: "laps_left > 1, ya warned"
    repeticion_cc: "edge-once"
    repeticion_vantare: "edge-once"
    canal_cc: "ingeniero TTS, priority 10"
    canal_vantare: "alert session IMMEDIATE audio_priority 2"
    texto_cc: "WAV: lap_counter/end_of_session + frases de posición"
