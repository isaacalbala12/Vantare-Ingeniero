    fuente_vantare: "spotter.py:_eval_last_lap"
    delta_conductual: "CC integra fin de sesión con mensaje de posición final (P1, podio, etc.). Vantare solo dice 'última vuelta'. CC SessionEndMessages tiene enable flag separado. Vantare edge-once correcto."
    cambio_propuesto: "Añadir mensaje post-carrera en engine.py (SessionEndTrigger ya existe con resumen P+best lap). Asegurar que el alert spotter 'última vuelta' y el trigger SessionEnd no se solapen."
    prioridad: P1
    test_sugerido: "test_session_end_no_duplicate: last lap spotter fires, then session_end trigger fires separately"
    paridad: MATCH
    evidencia_vantare: "LMU validation 2026-06-08; last lap spotter edge-once"

  - id: "LMU-09"
    nombre_cc: "Damage Reporting (Impact)"
    nombre_vantare: "Damage spotter (impact)"
    dispara_cuando_cc: "DamageLevel changes (NONE→TRIVIAL→MINOR→MAJOR→DESTROYED) en ENGINE, TRANNY, AERO, SUSPENSION, BRAKES. Delay 3s timeToWaitForDamageToSettle. Componente DESTROYED detectado. Puncture via TyreData pressure < punctureThreshold (30). MaxG impact > 40G >400m/s2."
    dispara_cuando_vantare: "spotter._eval_damage: last_impact_et nuevo y magnitude >= IMPACT_MAGNITUDE_MIN=25. También damage_summary si has_damage y _warned_damage flag"
    no_dispara_cuando_cc: "in_pits/in_garage (isMessageStillValid). DamageLevel no cambia. Ya reportado ese nivel."
    no_dispara_cuando_vantare: "in_pits (indirect), ya warned_damage, impact_et no cambia"
    repeticion_cc: "edge-once por nivel de daño (minDamageToReport). cooldown timeToWaitForDamageToSettle=3s"
    repeticion_vantare: "edge-once por impacto nuevo (ET), y edge-once por daño acumulado (_warned_damage)"
    canal_cc: "ingeniero TTS IMPORTANT_MESSAGE priority 15 (alta prioridad)"
    canal_vantare: "alert damage IMMEDIATE audio_priority 3-4 (WARNING-CRITICAL)"
    texto_cc: "WAV: severe/minor_aero/engine/suspension/brake_damage, punctures, missing_wheel, rolling, 'are you OK?'"
    texto_vantare: "TTS: format_impact_damage_message (severity: leve/moderado/grave), format_damage_summary (aero %)"
    propiedad_cc: "enable_damage_messages=true, enable_brake_damage_messages=true, enable_suspension_damage_messages=true, enable_crash_messages=true"
    fuente_cc: "DamageReporting.cs:triggerInternal"
    fuente_vantare: "spotter.py:_eval_damage, damage_report.py"
    delta_conductual: "CC tiene 5 componentes (engine, tranny, aero, suspension, brakes) con 5 niveles cada uno + puncture + missing_wheel + 'are you OK' tras crash >40G. Vantare solo detecta impacto (magnitude≥25) y resume daño aero%. No detecta puncture, missing_wheel, ni brake/suspension damage por separado. 'Are you OK' no existe. lmu_damage.py recién cableado."
    cambio_propuesto: "1) Extender damage_report.py con 5 componentes style CC. 2) Añadir puncture detection via tyre_pressure. 3) Añadir 'are you OK' tras deceleración >40G. 4) Usar lmu_damage.py para obtener damage data desglosada. 5) Edge-once por nivel de daño (no solo primer impacto)."
    prioridad: P0
    test_sugerido: "test_damage_multi_component: engine MINOR + aero MAJOR → solo aero MAJOR anunciado (worst first)"
    paridad: MATCH
    evidencia_vantare: "LMU validation 2026-06-08; impact spotter + CC damage module"

  - id: "LMU-10"
    nombre_cc: "Gap Messages (Timer/Ahead/Behind)"
    nombre_vantare: "Gaps spotter (UI-only)"
    dispara_cuando_cc: "enable_gap_messages=true, gapAhead/Behind < threshold, race solo, frecuencia configurable (frequency_of_gap_ahead_reports). DelayedMessage con validación en play."
    dispara_cuando_vantare: "gap_ahead < 0.5s o gap_behind < 0.5s, frecuencia SPOTTER_GAP_FREQUENCY_S=30s"
    no_dispara_cuando_cc: "enable_gap_messages=false, session!=race, isNotRacing (FCY/yellow/blue/pits), nearRaceEnd. NO report gaps < minGapToReport=0.05s"
    no_dispara_cuando_vantare: "category=gaps → NO_VOICE_CATEGORIES excluye TTS (solo UI). Frecuencia 30s"
    repeticion_cc: "sector-based randomness: gapAheadMinSectorWait, maxSectorWait (1-10 + randomness 0-2). Prefer mid-lap reports"
    repeticion_vantare: "time-based cada SPOTTER_GAP_FREQUENCY_S"
    canal_cc: "ingeniero TTS (timings/gap_in_front/behind_is_now), priority 5"
    canal_vantare: "alert gaps category, NO_VOICE_CATEGORIES → sin TTS, solo UI"
    texto_cc: "WAV: 'the gap to... ahead is increasing, it's now...' + time number + 'gap in front/behind is now...'"
    texto_vantare: "TTS: 'Gap con coche de delante/detrás estrecho: {gap:.2f}s' (pero silenciado)"
    propiedad_cc: "enable_gap_messages=true, frequency_of_gap_ahead_reports=5 (1-10), frequency_of_gap_behind_reports=5, gap_message_randomness=5"
    fuente_cc: "Timings.cs:_announceGaps, _gapInFront, _gapBehind"
    fuente_vantare: "spotter.py:_eval_gaps, alertVoice.ts NO_VOICE_CATEGORIES"
    delta_conductual: "**GAP MÁS GRANDE.** CC tiene gap messages configurables con voz por defecto (enable_gap_messages=true). Vantare genera alert gaps pero los silencia (NO_VOICE_CATEGORIES). CC tiene sistema sector-based con randomness, delayed message con re-validación; Vantare timer fijo. CC tiene gap_in_front_increasing/decreasing + driver name; Vantate solo umbral <0.5s."
    cambio_propuesto: "**P1:** Añadir UI toggle enable_gap_messages (default false). **P0:** NO CAMBIAR - silencio actual es intencional para evitar spam TTS en batalla. Si se activa en futuro: implementar sector-based randomness CC, delayed message re-validation, y gap_in_front/behind_increasing/decreasing."
    prioridad: P1
    test_sugerido: "test_gap_messages_ui_only: alert gaps category → shouldVoiceAlert=false"
    paridad: MISMATCH

