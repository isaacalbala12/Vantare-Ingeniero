name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'
  VERSION: '0.1.0-alpha'

jobs:
  build-installers:
    name: Build Installers
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install pyinstaller

      - name: Build backend
        run: |
          cd backend
          python -B build_backend.py --clean

      - name: Build sidecar
        run: |
          cd sidecar
          python build.py --noconfirm

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Create NSIS Installer
        run: |
          # Copiar archivos a la estructura que espera NSIS
          mkdir -p installer_build
          
          # Backend
          cp -r backend/dist/backend installer_build/backend
          
          # Sidecar
          cp -r sidecar/dist/strategy-sidecar installer_build/sidecar
          
          # LICENSE.txt (requerido por NSIS)
          cp LICENSE installer_build/LICENSE.txt
          
          # Crear NSIS script con rutas correctas
          $nsisScript = @"
; Vantare Ingeniero IA - NSIS Installer Script
!include "MUI2.nsh"

!define PRODUCT_NAME "Vantare Ingeniero IA"
!define PRODUCT_VERSION "${{ env.VERSION }}"
!define PRODUCT_PUBLISHER "Vantare"
!define PRODUCT_WEB_SITE "https://github.com/isaac-albala/Vantare-Ingeniero"
!define PRODUCT_DIR_REGKEY "Software\Microsoft\Windows\CurrentVersion\App Paths\vantare-engine.exe"
!define PRODUCT_UNINST_KEY "Software\Microsoft\Windows\CurrentVersion\Uninstall\${PRODUCT_NAME}"
!define PRODUCT_UNINST_ROOT_KEY "HKLM"

Name "${PRODUCT_NAME} ${PRODUCT_VERSION}"
OutFile "vantare-instalador-${PRODUCT_VERSION}.exe"
InstallDir "`$PROGRAMFILES\Vantare Ingeniero IA"
InstallDirRegKey HKLM "${PRODUCT_DIR_REGKEY}" ""
ShowInstDetails show
ShowUnInstDetails show

!define MUI_ABORTWARNING
!define MUI_ICON "`$NSISDIR\Contrib\Graphics\Icons\modern-install.ico"
!define MUI_UNICON "`$NSISDIR\Contrib\Graphics\Icons\modern-uninstall.ico"

!insertmacro MUI_PAGE_WELCOME
!insertmacro MUI_PAGE_LICENSE "LICENSE.txt"
!insertmacro MUI_PAGE_DIRECTORY
!insertmacro MUI_PAGE_INSTFILES
!insertmacro MUI_PAGE_FINISH

!insertmacro MUI_UNPAGE_CONFIRM
!insertmacro MUI_UNPAGE_INSTFILES

!insertmacro MUI_LANGUAGE "Spanish"
!insertmacro MUI_LANGUAGE "English"

Section "Principal" SEC01
  SetOutPath "`$INSTDIR"

  ; Copiar archivos del build
  File /r "backend\*.*"
  File /r "sidecar\*.*"
  
  ; Copiar LICENSE
  File "LICENSE.txt"
  
  ; Crear archivo de versión
  FileOpen `$0 "`$INSTDIR\VERSION.txt" w
  FileWrite `$0 "${PRODUCT_NAME} v${PRODUCT_VERSION}`r`n"
  FileWrite `$0 "Fecha de instalacion: "
  FileWrite `$0 __DATE__
  FileClose `$0

  ; ACCESOS DIRECTOS
  CreateDirectory "`$SMPROGRAMS\Vantare Ingeniero IA"
  CreateShortCut "`$SMPROGRAMS\Vantare Ingeniero IA\Vantare Engine.lnk" "`$INSTDIR\backend\backend.exe"
  CreateShortCut "`$SMPROGRAMS\Vantare Ingeniero IA\Desinstalar.lnk" "`$INSTDIR\uninstall.exe"
  CreateShortCut "`$DESKTOP\Vantare Engine.lnk" "`$INSTDIR\backend\backend.exe"

  ; REGISTRO DE WINDOWS
  WriteRegStr HKLM "${PRODUCT_DIR_REGKEY}" "" "`$INSTDIR\backend\backend.exe"
  WriteRegStr `${PRODUCT_UNINST_ROOT_KEY}` "${PRODUCT_UNINST_KEY}" "DisplayName" "`$(^Name)"
  WriteRegStr `${PRODUCT_UNINST_ROOT_KEY}` "${PRODUCT_UNINST_KEY}" "UninstallString" "`$INSTDIR\uninstall.exe"
  WriteRegStr `${PRODUCT_UNINST_ROOT_KEY}` "${PRODUCT_UNINST_KEY}" "DisplayIcon" "`$INSTDIR\backend\backend.exe"
  WriteRegStr `${PRODUCT_UNINST_ROOT_KEY}` "${PRODUCT_UNINST_KEY}" "DisplayVersion" "${PRODUCT_VERSION}"
  WriteRegStr `${PRODUCT_UNINST_ROOT_KEY}` "${PRODUCT_UNINST_KEY}" "URLInfoAbout" "${PRODUCT_WEB_SITE}"
  WriteRegStr `${PRODUCT_UNINST_ROOT_KEY}` "${PRODUCT_UNINST_KEY}" "Publisher" "${PRODUCT_PUBLISHER}"

  ; Escribir desinstalador
  WriteUninstaller "`$INSTDIR\uninstall.exe"
SectionEnd

Section "Uninstall"
  RMDir /r "`$INSTDIR"
  Delete "`$DESKTOP\Vantare Engine.lnk"
  RMDir /r "`$SMPROGRAMS\Vantare Ingeniero IA"
  DeleteRegKey `${PRODUCT_UNINST_ROOT_KEY}` "${PRODUCT_UNINST_KEY}"
  DeleteRegKey HKLM "${PRODUCT_DIR_REGKEY}"
SectionEnd
"@
          
          $nsisScript | Out-File -FilePath "installer_build/windows.nsi" -Encoding utf8
          
          # Compilar instalador
          cd installer_build
          & "C:\Program Files (x86)\NSIS\makensis.exe" windows.nsi
          
          # Mover el exe generado
          Move-Item -Path "*.exe" -Destination ..\ -Force
          cd ..

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: vantare-instalador-exe
          path: |
            vantare-instalador-*.exe

  create-release:
    name: Create Release
    needs: [build-installers]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: vantare-instalador-exe
          path: artifacts

      - name: List files
        run: |
          echo "=== Installer files ==="
          ls -la artifacts/
          find artifacts -name "*.exe" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref }}
          files: |
            artifacts/**/*.exe
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
