name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'

jobs:
  build-backend:
    name: Build Backend (vantare-engine)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: vantare-engine-windows
          - os: ubuntu-24.04
            artifact: vantare-engine-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install pyinstaller

      - name: Build backend
        run: |
          cd backend
          python build.py --noconfirm
          dir dist

      - name: List and fix dist contents
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Path backend/dist -Recurse | Select-Object FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            backend/dist/

  build-sidecar:
    name: Build Sidecar (strategy-sidecar)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: strategy-sidecar-windows
          - os: ubuntu-24.04
            artifact: strategy-sidecar-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install pyinstaller

      - name: Build sidecar
        run: |
          cd sidecar
          python build.py --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            sidecar/dist/

  build-installers:
    name: Build Installers
    runs-on: ubuntu-24.04
    needs: [build-backend, build-sidecar]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev nsis zip

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Artifacts ==="
          find artifacts -type f | head -50

      - name: Create portable ZIP for Windows
        run: |
          mkdir -p release
          
          # Copy Windows builds to release folder
          if [ -d "artifacts/vantare-engine-windows" ]; then
            echo "Found Windows backend"
            cp -r artifacts/vantare-engine-windows release/vantare-engine-win
          fi
          
          if [ -d "artifacts/strategy-sidecar-windows" ]; then
            echo "Found Windows sidecar"
            cp -r artifacts/strategy-sidecar-windows release/strategy-sidecar-win
          fi
          
          # Copy Linux builds
          if [ -d "artifacts/vantare-engine-linux" ]; then
            echo "Found Linux backend"
            cp -r artifacts/vantare-engine-linux release/vantare-engine-linux
          fi
          
          if [ -d "artifacts/strategy-sidecar-linux" ]; then
            echo "Found Linux sidecar"
            cp -r artifacts/strategy-sidecar-linux release/strategy-sidecar-linux
          fi
          
          ls -laR release/
          
          # Create ZIPs
          zip -r release/vantare-engine-win.zip release/vantare-engine-win 2>/dev/null || true
          zip -r release/strategy-sidecar-win.zip release/strategy-sidecar-win 2>/dev/null || true
          tar -czf release/vantare-engine-linux.tar.gz -C release vantare-engine-linux 2>/dev/null || true
          tar -czf release/strategy-sidecar-linux.tar.gz -C release strategy-sidecar-linux 2>/dev/null || true
          
          echo "=== Generated packages ==="
          ls -la release/

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-installers
          path: |
            release/**

  create-release:
    name: Create Release
    needs: [build-installers]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all files
        run: |
          echo "=== All files ==="
          find artifacts -type f 2>/dev/null

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}