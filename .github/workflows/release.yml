name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'
  VERSION: '0.1.0-alpha'

jobs:
  build-backend:
    name: Build Backend (vantare-engine)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install pyinstaller

      - name: Build backend
        run: |
          cd backend
          python3 -B build_backend.py --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vantare-engine-windows
          path: |
            backend/dist/

  build-sidecar:
    name: Build Sidecar (strategy-sidecar)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install pyinstaller

      - name: Build sidecar
        run: |
          cd sidecar
          python build.py --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: strategy-sidecar-windows
          path: |
            sidecar/dist/

  build-installers:
    name: Build Installers (ZIP)
    runs-on: ubuntu-24.04
    needs: [build-backend, build-sidecar]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          df -h .

      - name: Download Windows backend
        uses: actions/download-artifact@v4
        with:
          name: vantare-engine-windows
          path: artifacts/vantare-engine-windows

      - name: Download Windows sidecar
        uses: actions/download-artifact@v4
        with:
          name: strategy-sidecar-windows
          path: artifacts/strategy-sidecar-windows

      - name: Build Windows portable ZIP
        run: |
          mkdir -p pkg/backend pkg/sidecar
          cp -r artifacts/vantare-engine-windows/* pkg/backend/
          cp -r artifacts/strategy-sidecar-windows/* pkg/sidecar/
          echo "Vantare Ingeniero IA v${{ env.VERSION }}" > pkg/LICENSE.txt
          
          cd pkg
          zip -r ../vantare-instalador-${{ env.VERSION }}.zip backend sidecar LICENSE.txt
          cd ..
          
          echo "=== Generated ZIP ==="
          ls -la vantare-instalador-*.zip
          echo "Package generation complete"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: vantare-instalador
          path: |
            vantare-instalador-*.zip

  create-release:
    name: Create Release
    needs: [build-installers]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all files
        run: |
          echo "=== All installer files ==="
          find artifacts -type f 2>/dev/null | grep -E "\.(exe|zip)$" | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref }}
          files: |
            artifacts/**/*.zip
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
