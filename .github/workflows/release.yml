name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'
  VERSION: '0.1.0-alpha'

jobs:
  build-backend:
    name: Build Backend (vantare-engine)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: vantare-engine-windows
          - os: ubuntu-24.04
            artifact: vantare-engine-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install pyinstaller

      - name: Build backend
        run: |
          cd backend
          python build_backend.py --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            backend/dist/

  build-sidecar:
    name: Build Sidecar (strategy-sidecar)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: strategy-sidecar-windows
          - os: ubuntu-24.04
            artifact: strategy-sidecar-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install pyinstaller

      - name: Build sidecar
        run: |
          cd sidecar
          python build.py --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            sidecar/dist/

  build-installers:
    name: Build Installers (NSIS + DEB)
    runs-on: ubuntu-24.04
    needs: [build-backend, build-sidecar]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev nsis zip
          df -h .

      # =====================================================================
      # WINDOWS INSTALLER (download, build, cleanup)
      # =====================================================================
      - name: Download Windows backend
        uses: actions/download-artifact@v4
        with:
          name: vantare-engine-windows
          path: artifacts/vantare-engine-windows

      - name: Download Windows sidecar
        uses: actions/download-artifact@v4
        with:
          name: strategy-sidecar-windows
          path: artifacts/strategy-sidecar-windows

      - name: Build Windows portable ZIP
        run: |
          mkdir -p pkg/backend pkg/sidecar
          cp -r artifacts/vantare-engine-windows/* pkg/backend/
          cp -r artifacts/strategy-sidecar-windows/* pkg/sidecar/
          echo "Vantare Ingeniero IA v${{ env.VERSION }}" > pkg/LICENSE.txt
          
          cd pkg
          zip -r ../vantare-instalador-${{ env.VERSION }}.zip backend sidecar LICENSE.txt
          cd ..
          
          # Clean Windows artifacts immediately
          rm -rf artifacts/vantare-engine-windows artifacts/strategy-sidecar-windows pkg
          echo "=== Disk after Windows build ==="
          df -h .

      # =====================================================================
      # LINUX DEB (download, build, cleanup)
      # =====================================================================
      - name: Download Linux backend
        uses: actions/download-artifact@v4
        with:
          name: vantare-engine-linux
          path: artifacts/vantare-engine-linux

      - name: Download Linux sidecar
        uses: actions/download-artifact@v4
        with:
          name: strategy-sidecar-linux
          path: artifacts/strategy-sidecar-linux

      - name: Build Linux DEB package
        run: |
          mkdir -p installer-build/linux/DEBIAN
          mkdir -p installer-build/linux/usr/bin
          mkdir -p installer-build/linux/usr/share/doc/vantare-engine
          mkdir -p installer-build/linux/usr/share/applications
          
          cp -r artifacts/vantare-engine-linux/* installer-build/linux/usr/bin/ 2>/dev/null || true
          cp -r artifacts/strategy-sidecar-linux/* installer-build/linux/usr/bin/ 2>/dev/null || true
          
          # Create DEBIAN/control
          echo "Package: vantare-engine" > installer-build/linux/DEBIAN/control
          echo "Version: ${{ env.VERSION }}" >> installer-build/linux/DEBIAN/control
          echo "Section: games" >> installer-build/linux/DEBIAN/control
          echo "Priority: optional" >> installer-build/linux/DEBIAN/control
          echo "Architecture: amd64" >> installer-build/linux/DEBIAN/control
          echo "Depends: python3.12" >> installer-build/linux/DEBIAN/control
          echo "Maintainer: Vantare <info@vantare.es>" >> installer-build/linux/DEBIAN/control
          echo "Description: Vantare Ingeniero IA - Race Strategy Assistant" >> installer-build/linux/DEBIAN/control
          echo " A real-time race strategy assistant for Le Mans Ultimate (LMU)." >> installer-build/linux/DEBIAN/control
          echo " Provides pit strategies, tire recommendations, and voice advice." >> installer-build/linux/DEBIAN/control

          # Create postinst
          echo '#!/bin/bash' > installer-build/linux/DEBIAN/postinst
          echo 'chmod +x /usr/bin/vantare-engine 2>/dev/null || true' >> installer-build/linux/DEBIAN/postinst
          echo 'chmod +x /usr/bin/vantare-sidecar 2>/dev/null || true' >> installer-build/linux/DEBIAN/postinst
          echo 'mkdir -p ~/.config/vantare' >> installer-build/linux/DEBIAN/postinst
          echo 'echo "Vantare Ingeniero IA installed!"' >> installer-build/linux/DEBIAN/postinst
          chmod 755 installer-build/linux/DEBIAN/postinst
          
          # Create postrm
          echo '#!/bin/bash' > installer-build/linux/DEBIAN/postrm
          echo 'if [ "$1" = "purge" ]; then' >> installer-build/linux/DEBIAN/postrm
          echo '  rm -rf ~/.config/vantare 2>/dev/null || true' >> installer-build/linux/DEBIAN/postrm
          echo 'fi' >> installer-build/linux/DEBIAN/postrm
          chmod 755 installer-build/linux/DEBIAN/postrm
          
          # Copy LICENSE
          echo "Vantare Ingeniero IA v${{ env.VERSION }}" > installer-build/linux/usr/share/doc/vantare-engine/copyright
          
          # Create desktop entry
          echo '[Desktop Entry]' > installer-build/linux/usr/share/applications/vantare-engine.desktop
          echo 'Name=Vantare Ingeniero IA' >> installer-build/linux/usr/share/applications/vantare-engine.desktop
          echo 'Comment=Race Strategy Assistant for Le Mans Ultimate' >> installer-build/linux/usr/share/applications/vantare-engine.desktop
          echo 'Exec=/usr/bin/vantare-engine' >> installer-build/linux/usr/share/applications/vantare-engine.desktop
          echo 'Icon=utilities-terminal' >> installer-build/linux/usr/share/applications/vantare-engine.desktop
          echo 'Terminal=true' >> installer-build/linux/usr/share/applications/vantare-engine.desktop
          echo 'Type=Application' >> installer-build/linux/usr/share/applications/vantare-engine.desktop
          echo 'Categories=Game;' >> installer-build/linux/usr/share/applications/vantare-engine.desktop

          echo "=== Linux DEB contents ==="
          ls -laR installer-build/linux/

      - name: Build DEB package
        run: |
          cd installer-build/linux
          dpkg-deb --build . ../../vantare-engine-${{ env.VERSION }}_amd64.deb
          cd ../..
          
          echo "=== Generated DEB ==="
          ls -la vantare-engine-*.deb
          
          # Cleanup Linux artifacts and installer-build/linux (no longer needed)
          rm -rf artifacts/vantare-engine-linux artifacts/strategy-sidecar-linux installer-build/linux
          echo "=== Disk space after cleanup ==="
          df -h .

      - name: Create portable archives
        run: |
          echo "=== All generated packages ==="
          ls -la vantare-*.zip vantare-engine-*.deb 2>/dev/null
          echo "Package generation complete"

      - name: Upload all installers
        uses: actions/upload-artifact@v4
        with:
          name: all-installers
          path: |
            vantare-*.zip
            vantare-engine-*.deb
            vantare-engine-*.tar.gz

  create-release:
    name: Create Release
    needs: [build-installers]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all files
        run: |
          echo "=== All installer files ==="
          find artifacts -type f 2>/dev/null | grep -E "\.(exe|deb|zip|tar\.gz)$" | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref }}
          files: |
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.tar.gz
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}