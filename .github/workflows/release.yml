name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'
  VERSION: '0.1.0-alpha'

jobs:
  build-installers:
    name: Build Installers
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install pyinstaller

      - name: Build backend
        run: |
          cd backend
          python -B build_backend.py --clean

      - name: Build sidecar
        run: |
          cd sidecar
          python build.py --noconfirm

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Create NSIS Installer
        run: |
          # Copiar archivos a la estructura que espera NSIS
          mkdir -p installer_build
          
          # Backend
          cp -r backend/dist/backend installer_build/
          
          # Sidecar
          cp -r sidecar/dist/strategy-sidecar installer_build/
          
          # LICENSE.txt
          cp LICENSE installer_build/
          
          # Crear NSIS script
          $nsis = @"
!include "MUI2.nsh"
!define PRODUCT_NAME "Vantare Ingeniero IA"
!define PRODUCT_VERSION "$env:VERSION"
!define PRODUCT_PUBLISHER "Vantare"
Name "`${PRODUCT_NAME} `${PRODUCT_VERSION}"
OutFile "vantare-instalador-${env:VERSION}.exe"
InstallDir "`$PROGRAMFILES\Vantare Ingeniero IA"
InstallDirRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\App Paths\vantare-engine.exe" ""
ShowInstDetails show
ShowUnInstDetails show
!define MUI_ABORTWARNING
!define MUI_ICON "`$NSISDIR\Contrib\Graphics\Icons\modern-install.ico"
!define MUI_UNICON "`$NSISDIR\Contrib\Graphics\Icons\modern-uninstall.ico"
!insertmacro MUI_PAGE_WELCOME
!insertmacro MUI_PAGE_LICENSE "LICENSE"
!insertmacro MUI_PAGE_DIRECTORY
!insertmacro MUI_PAGE_INSTFILES
!insertmacro MUI_PAGE_FINISH
!insertmacro MUI_UNPAGE_CONFIRM
!insertmacro MUI_UNPAGE_INSTFILES
!insertmacro MUI_LANGUAGE "Spanish"
!insertmacro MUI_LANGUAGE "English"
Section "Main" SEC01
  SetOutPath "`$INSTDIR"
  File /r "backend\*.*"
  File /r "strategy-sidecar\*.*"
  File "LICENSE"
  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\App Paths\vantare-engine.exe" "" "`$INSTDIR\backend\backend.exe"
  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Vantare Ingeniero IA" "DisplayName" "`$(^Name)"
  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Vantare Ingeniero IA" "UninstallString" "`$INSTDIR\uninstall.exe"
  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Vantare Ingeniero IA" "DisplayIcon" "`$INSTDIR\backend\backend.exe"
  WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Vantare Ingeniero IA" "Publisher" "Vantare"
  WriteUninstaller "`$INSTDIR\uninstall.exe"
SectionEnd
Section "Uninstall"
  RMDir /r "`$INSTDIR"
  DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Vantare Ingeniero IA"
  DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\App Paths\vantare-engine.exe"
SectionEnd
"@
          $nsis | Out-File -FilePath installer_build/windows.nsi -Encoding utf8
          
          # Compilar
          cd installer_build
          & "C:\Program Files (x86)\NSIS\makensis.exe" windows.nsi
          
          # Copiar resultado
          Copy-Item *.exe ..\ -Force
          cd ..

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: vantare-instalador-exe
          path: |
            vantare-instalador-*.exe

  create-release:
    name: Create Release
    needs: [build-installers]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: vantare-instalador-exe
          path: artifacts

      - name: List files
        run: |
          echo "=== Installer files ==="
          ls -la artifacts/
          find artifacts -name "*.exe" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref }}
          files: |
            artifacts/**/*.exe
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
