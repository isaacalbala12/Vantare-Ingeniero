name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'

jobs:
  build-backend:
    name: Build Backend (vantare-engine)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: vantare-engine-windows
          - os: ubuntu-24.04
            artifact: vantare-engine-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e shared-telemetry -e shared-strategy
          pip install pyinstaller

      - name: Build backend
        run: |
          cd backend
          python build.py --noconfirm

      - name: List dist contents
        run: ls -la backend/dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: backend/dist/vantare-engine/

  build-sidecar:
    name: Build Sidecar (strategy-sidecar)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: strategy-sidecar-windows
          - os: ubuntu-24.04
            artifact: strategy-sidecar-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e shared-telemetry -e shared-strategy
          pip install pyinstaller

      - name: Build sidecar
        run: |
          cd sidecar
          python build.py --noconfirm

      - name: List dist contents
        run: ls -la sidecar/dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: sidecar/dist/strategy-sidecar/

  build-installers:
    name: Build Installers
    runs-on: ubuntu-24.04
    needs: [build-backend, build-sidecar]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev nsis

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Prepare Windows installer directory
        run: |
          mkdir -p installer/build/windows
          mkdir -p installer/build/windows/backend
          mkdir -p installer/build/windows/sidecar
          cp -r artifacts/vantare-engine-windows/* installer/build/windows/backend/
          cp -r artifacts/strategy-sidecar-windows/* installer/build/windows/sidecar/
          ls -laR installer/build/windows/

      - name: Build Windows NSIS installer
        run: |
          cd installer/build/windows
          cp ../../../../installer/windows.nsi .
          echo "Vantare Ingeniero IA Alpha v0.1.0" > LICENSE.txt
          ls -la
          if command -v makensis &> /dev/null; then
            makensis windows.nsi || echo "NSIS build may have issues"
          else
            echo "NSIS not installed, skipping Windows installer"
          fi

      - name: Prepare Linux package directory
        run: |
          mkdir -p installer/build/linux/usr/bin
          cp -r artifacts/vantare-engine-linux/* installer/build/linux/usr/bin/ 2>/dev/null || true
          cp -r artifacts/strategy-sidecar-linux/* installer/build/linux/usr/bin/ 2>/dev/null || true
          ls -la installer/build/linux/usr/bin/

      - name: Build Linux DEB package
        run: |
          cd installer
          chmod +x build.sh
          ./build.sh --linux-only

      - name: List generated installers
        run: |
          echo "=== All generated files ==="
          find installer/build -type f 2>/dev/null
          echo ""
          echo "=== Windows .exe files ==="
          find installer/build -name "*.exe" -type f 2>/dev/null
          echo ""
          echo "=== Linux packages ==="
          find installer/build -name "*.deb" -type f 2>/dev/null
          find installer/build -name "*.AppImage" -type f 2>/dev/null

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-installers
          path: |
            installer/build/**/*
            artifacts/**/*

  create-release:
    name: Create Release
    needs: [build-installers]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: false

      - name: List all files
        run: |
          echo "=== artifacts directory ==="
          find artifacts -type f 2>/dev/null | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*exe
            artifacts/**/*.AppImage
            artifacts/**/*linux*/**
            artifacts/**/*windows*/**
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}