name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'
  VERSION: '0.1.0-alpha'

jobs:
  build-installers:
    name: Build Installers
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install pyinstaller

      - name: Build backend
        run: |
          cd backend
          python -B build_backend.py --clean

      - name: Build sidecar
        run: |
          cd sidecar
          python build.py --noconfirm

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Create NSIS Installer
        run: |
          # Copiar archivos a la estructura que espera NSIS
          mkdir -p installer_build/backend
          mkdir -p installer_build/sidecar
          mkdir -p installer_build/config
          
          # Backend
          cp -r backend/dist/backend/* installer_build/backend/
          
          # Sidecar
          cp -r sidecar/dist/strategy-sidecar/* installer_build/sidecar/
          
          # Config ejemplo
          cp backend/.env.example installer_build/config/.env.example 2>$null
          
          # Copiar NSIS script con rutas correctas
          (Get-Content installer/windows.nsi) -replace 'backend\\dist\\vantare-engine', 'installer_build\backend' -replace 'sidecar\\dist\\strategy-sidecar', 'installer_build\sidecar' | Set-Content installer_build/windows.nsi
          
          # Compilar instalador
          cd installer_build
          & "C:\Program Files (x86)\NSIS\makensis.exe" windows.nsi
          
          # Mover el exe generado a la raíz
          mv installer/*.exe ./
          mv vantare-instalador-*.exe ../vantare-instalador-${{ env.VERSION }}.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: vantare-instalador-exe
          path: |
            vantare-instalador-*.exe

  create-release:
    name: Create Release
    needs: [build-installers]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: vantare-instalador-exe
          path: artifacts

      - name: List files
        run: |
          echo "=== Installer files ==="
          ls -la artifacts/
          find artifacts -name "*.exe" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.ref }}
          files: |
            artifacts/**/*.exe
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
