name: CI

on:
  push:
    branches: [master, crewchief-parity]
  pull_request:
    branches: [master, crewchief-parity]
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-backend:
    name: Backend Tests + Coverage
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./shared-telemetry
          pip install -e ./shared-strategy
          pip install -e ./backend[dev]

      - name: Run backend tests with coverage
        run: |
          cd backend
          python -m pytest tests/ -v --cov=src/ --cov-report=term --cov-fail-under=70

  test-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Vitest
        run: npm test
        working-directory: frontend

  build-frontend:
    name: Frontend Typecheck + Production Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck and Vite build
        run: npm run build
        working-directory: frontend

      - name: Compile Electron main/preload
        run: npm run build:electron
        working-directory: frontend

  smoke-backend:
    name: Smoke Test — Backend Import
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./shared-telemetry
          pip install -e ./shared-strategy
          pip install -e ./backend

      - name: Smoke import check
        run: |
          cd backend
          python -c "from src.main import app; print('Backend import OK')"

      - name: Syntax check all Python files
        run: |
          cd backend
          python -m compileall src/ -q
