name: Pre-Release Gate

# Build desktop installer without publishing — run before tagging v*
on:
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-desktop-dry-run:
    name: Build Desktop (no publish)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps
        run: |
          pip install -e ./shared-telemetry -e ./shared-strategy
          pip install -e ./backend
          pip install pyinstaller

      - name: Build duck_lmu
        run: cargo build --release
        working-directory: native/duck_lmu

      - name: Build backend
        run: python backend/build_backend.py

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build desktop installer
        run: npm run build:desktop
        working-directory: frontend

      - name: Verify release artifacts
        run: powershell -File scripts/verify-desktop-artifacts.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-preview
          path: |
            frontend/release/*.exe
            frontend/release/latest.yml
          retention-days: 7
